name: Stockpile backend quality
on:
  workflow_dispatch:
    inputs:
      run_integration:
        description: Run tests that require live local infrastructure
        required: false
        type: boolean
        default: false
  pull_request:
  push:
    branches: [main]
jobs:
  source-viewer-contract:
    name: source-viewer-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: ./scripts/check-collabora-compose-contract.py
      - run: PYTHONPATH=. uv run pytest -q tests/test_collabora_embedding_readiness.py tests/test_source_link_trace_sampling.py tests/test_collabora_viewer_url.py tests/test_wopi_tokens.py
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: uv run python -m compileall -q api application services infrastructure
      - run: PYTHONPATH=. uv run pytest -q -m "not integration"
  integration:
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - name: Run opt-in infrastructure tests
        run: PYTHONPATH=. uv run pytest -q -m integration || test $? -eq 5
