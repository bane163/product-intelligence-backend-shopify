version: '3.8'

services:
  collabora:
    image: collabora/code:latest
    container_name: collabora-online
    restart: unless-stopped
    environment:
      - domain=localhost
      - aliasgroup1=http://localhost:8080
      - username=admin
      - password=admin
      - dictionaries=en_US
      - extra_params=--o:ssl.enable=false
    cap_add:
      - MKNOD
    ports:
      - "9980:9980"
    networks:
      - collabora-net

  wopi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collabora-wopi
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./storage:/app/storage
    expose:
      - "8000"
    command: ["uv", "run", "uvicorn", "collabora_wopi_server.app:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - wopi-net

  nginx:
    image: nginx:alpine
    container_name: collabora-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - collabora
      - wopi
    networks:
      - collabora-net
      - wopi-net

networks:
  collabora-net:
    driver: bridge
  wopi-net:
    driver: bridge