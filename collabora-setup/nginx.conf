events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # support websocket Upgrade header handling
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream collabora_backend {
        server collabora:9980;
    }
    upstream wopi_backend {
        # service is named `wopi-server` in the compose stack
        server wopi-server:8000;
    }

    # Single HTTP server for local development. Using plain HTTP avoids
    # requiring mounted TLS certificates under /etc/nginx/ssl.
    server {
        listen 80;
        server_name _;

        # Accept large uploads from editor
        client_max_body_size 0;

        # static files served by Collabora
        location ^~ /browser {
            proxy_pass http://collabora_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WOPI discovery and capabilities served by Collabora
        location ^~ /hosting/discovery {
            proxy_pass http://collabora_backend;
            proxy_set_header Host $host;
        }

        location ^~ /hosting/capabilities {
            proxy_pass http://collabora_backend;
            proxy_set_header Host $host;
        }

        # main websocket for Collabora
        location ~ ^/cool/(.*)/ws$ {
            proxy_pass http://collabora_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 36000s;
            proxy_buffering off;
        }

        # admin websocket
        location ^~ /cool/adminws {
            proxy_pass http://collabora_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 36000s;
            proxy_buffering off;
        }

        # download, presentation and image upload
        location ~ ^/(c|l)ool {
            proxy_pass http://collabora_backend;
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        # LO leaflet/lool paths
        location /loleaflet {
            proxy_pass http://collabora_backend;
            proxy_set_header Host $host;
        }

        location /lool/ {
            proxy_pass http://collabora_backend;
            proxy_set_header Host $host;
        }

        # WOPI endpoints handled by the WOPI server
        location /wopi/ {
            proxy_pass http://wopi_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Static files served locally (optional)
        location /static/ {
            alias /app/static/;
            expires 1y;
            add_header Cache-Control public;
        }
    }
}