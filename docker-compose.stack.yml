services:
  collabora:
    image: collabora/code:latest
    container_name: collabora-online
    restart: unless-stopped
    environment:
      - domain=.*
      - username=${ADMIN_USERNAME:-admin}
      - password=${ADMIN_PASSWORD:-admin}
      - dictionaries=en_US
      # Allow framing from any origin (needed for cloudflared tunnels)
      # Don't set server_name so Collabora uses the Host header from requests
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:net.frame_ancestors=*
    cap_add:
      - MKNOD
    ports:
      - "9980:9980"
    networks:
      - collabora-net
    volumes:
      - collabora-data:/var/lib/lool
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9980" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  shopify-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopify-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - COLLABORA_URL=http://collabora:9980
      - DEBUG=true
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      collabora:
        condition: service_healthy
    command: [ "uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    networks:
      - collabora-net

networks:
  collabora-net:
    driver: bridge

volumes:
  collabora-data:
