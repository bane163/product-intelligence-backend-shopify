services:
  collabora:
    image: collabora/code:latest
    container_name: collabora-online
    restart: unless-stopped
    environment:
      - domain=.*
      - username=${ADMIN_USERNAME:-admin}
      - password=${ADMIN_PASSWORD:-admin}
      - dictionaries=en_US
      # Allow framing from any origin (needed for cloudflared tunnels)
      # Don't set server_name so Collabora uses the Host header from requests
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:net.frame_ancestors=*
    cap_add:
      - MKNOD
    ports:
      - "9980:9980"
    networks:
      - collabora-net
    volumes:
      - collabora-data:/var/lib/lool
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9980" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  wopi-server:
    build:
      context: ./collabora-setup
      dockerfile: Dockerfile
    container_name: collabora-wopi
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - FILE_STORAGE_PATH=/app/storage
    command: [ "uv", "run", "uvicorn", "collabora_wopi_server.app:app", "--host", "0.0.0.0", "--port", "8000" ]
    volumes:
      - ./collabora-setup/storage:/app/storage
    expose:
      - "8000"
    networks:
      - wopi-net

  nginx:
    image: nginx:alpine
    container_name: collabora-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./collabora-setup/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./collabora-setup/ssl:/etc/nginx/ssl:ro
    depends_on:
      collabora:
        condition: service_healthy
      wopi-server:
        condition: service_started
    networks:
      - collabora-net
      - wopi-net

  shopify-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopify-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - COLLABORA_URL=http://collabora:9980
      - DEBUG=true
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      collabora:
        condition: service_healthy
      wopi-server:
        condition: service_started
      nginx:
        condition: service_started
    command: [ "uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    networks:
      - wopi-net
      - collabora-net

networks:
  collabora-net:
    driver: bridge
  wopi-net:
    driver: bridge

volumes:
  collabora-data:
