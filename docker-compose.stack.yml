services:
  collabora:
    # Production is deliberately pinned. `latest` is exercised only by the
    # nightly canary workflow; upgrades happen in a dedicated reviewed change.
    image: ${COLLABORA_IMAGE:-collabora/code:25.04.7.1.1@sha256:b70d5ffb3c88ec365c3685cbd4ce56cd0d29122a1290e98e7f0e9932c2cd8246}
    container_name: collabora-online
    restart: unless-stopped
    environment:
      - domain=.*
      - username=${ADMIN_USERNAME:-admin}
      - password=${ADMIN_PASSWORD:-admin}
      - dictionaries=en_US
      # Don't set server_name so Collabora uses the Host header from requests
      - extra_params=--o:ssl.enable=false --o:ssl.termination=true
    # Keep the CSP override as one argument so its spaces and wildcard survive
    # Docker/entrypoint parsing. Local tunnels need "*"; deployments should set
    # COLLABORA_FRAME_ANCESTORS to their explicit application origin(s).
    command: [ "--o:net.content_security_policy=frame-ancestors ${COLLABORA_FRAME_ANCESTORS:-*}" ]
    cap_add:
      - MKNOD
    ports:
      - "9980:9980"
    networks:
      - collabora-net
    volumes:
      - collabora-data:/var/lib/lool
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9980/hosting/discovery >/dev/null && test $(df -Pk /var/lib/lool | awk 'NR==2 {print $4}') -ge 10485760 && test $(df -Pk /var/lib/lool | awk 'NR==2 {gsub(/%/,\"\",$5); print 100-$5}') -ge 10" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  shopify-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopify-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - COLLABORA_URL=http://collabora:9980
      - DEBUG=true
      - COLLABORA_TUNNEL_REQUIRED=true
      - SUPABASE_URL=http://host.docker.internal:54321
    volumes:
      - ./:/app
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      collabora:
        condition: service_started
    healthcheck:
      test: [ "CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: [ "/app/.venv/bin/python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000" ]
    networks:
      - collabora-net

  offload-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: offload-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SUPABASE_URL=http://host.docker.internal:54321
      - COLLABORA_URL=http://collabora:9980
      - OFFLOAD_QUEUE_NAME=${OFFLOAD_QUEUE_NAME:-offload}
      - OFFLOAD_WORKER_ID=${OFFLOAD_WORKER_ID:-offload-worker}
      - OFFLOAD_LEASE_SECONDS=${OFFLOAD_LEASE_SECONDS:-300}
      - OFFLOAD_POLL_SECONDS=${OFFLOAD_POLL_SECONDS:-2.0}
    volumes:
      - ./:/app
      - /app/.venv
    depends_on:
      shopify-backend:
        condition: service_healthy
    command: [ "/app/.venv/bin/python", "offload_worker.py" ]
    networks:
      - collabora-net

networks:
  collabora-net:
    driver: bridge

volumes:
  collabora-data:
