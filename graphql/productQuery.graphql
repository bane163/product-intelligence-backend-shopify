query product($id: ID!) {
  node(id: $id) {
    ... on Product {
      id
      title
      descriptionHtml
      vendor
      handle
      productType
      status
      tags
      seo {
        title
        description
      }
      options { name position optionValues { name } }
      variants(first: 250) { nodes { id title sku price selectedOptions { name value } } }
    }
  }
}
