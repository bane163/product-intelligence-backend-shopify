mutation productSet($input: ProductSetInput!, $identifier: ProductSetIdentifiers) {
  productSet(input: $input, synchronous: true, identifier: $identifier) {
    product {
      id
      title
      handle
      options { name position optionValues { name } }
      variants(first: 250) { nodes { id title sku price selectedOptions { name value } }
    }
    userErrors {
      field
      message
    }
  }
}
